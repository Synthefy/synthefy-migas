# Overlay: adds a vLLM sidecar for self-contained summary generation.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.vllm.yml up -d
#
# The vLLM server downloads the model on first start (~60-240 GB depending on
# the model). Use the vllm-cache volume to persist it across restarts.

services:
  migas:
    depends_on:
      vllm:
        condition: service_healthy
    environment:
      - VLLM_BASE_URL=http://vllm:8004/v1
      - VLLM_MODEL=${VLLM_MODEL:-openai/gpt-oss-120b}

  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8004:8004"
    environment:
      - VLLM_MODEL=${VLLM_MODEL:-openai/gpt-oss-120b}
      - HF_TOKEN=${HF_TOKEN:-}
    command: >
      --model ${VLLM_MODEL:-openai/gpt-oss-120b}
      --port 8004
      --max-model-len ${VLLM_MAX_MODEL_LEN:-32768}
      --tensor-parallel-size ${VLLM_TENSOR_PARALLEL_SIZE:-1}
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.60}
    volumes:
      - vllm-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 5
    restart: unless-stopped

volumes:
  vllm-cache:
