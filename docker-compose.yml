services:
  migas:
    build: .
    ports:
      - "8080:8080"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - MIGAS_API_KEY=${MIGAS_API_KEY:-}
      - MIGAS_DEVICE=${MIGAS_DEVICE:-auto}
      - MIGAS_MODEL=${MIGAS_MODEL:-Synthefy/migas-1.5}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://localhost:8004/v1}
      - VLLM_MODEL=${VLLM_MODEL:-openai/gpt-oss-120b}
      - NVIDIA_VISIBLE_DEVICES=${MIGAS_GPU:-0}
    volumes:
      - model-cache:/app/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  model-cache:
